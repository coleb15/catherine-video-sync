name: Sync Commission Videos

on:
  schedule:
    # TEMPORARY for testing autonomous firing — will be reset to the real
    # daily schedule right after confirming this fires on its own.
    - cron: "25 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install exact pinned dependencies
        run: npm ci

      - name: Ensure ffmpeg is installed
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n 1

      - name: Run sync
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
        run: npm run sync

      - name: Commit updated sync state and heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # GitHub auto-disables scheduled workflows after 60 days with no
          # COMMITS to the repo (workflow runs themselves don't count,
          # confirmed via GitHub's own docs). This file guarantees a commit
          # every day this runs, so that can never happen silently.
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-run.txt
          git add .sync-state.json .last-run.txt
          if ! git diff --cached --quiet; then
            git commit -m "Sync run: $(date -u +%Y-%m-%d)"
            git push
          fi
